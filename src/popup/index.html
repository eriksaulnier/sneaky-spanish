<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Sneaky Spanish</title>
</head>
<body>
  <div id="app">
    <header>
      <h1><img src="../../assets/icons/icon128.png" width="24" height="24" alt=""> Sneaky Spanish</h1>
      <label class="toggle">
        <input type="checkbox" id="enabled">
        <span class="toggle-slider"></span>
      </label>
    </header>

    <section>
      <label for="level">CEFR Level</label>
      <select id="level"></select>
    </section>

    <section>
      <label class="checkbox-label">
        <input type="checkbox" id="highlight">
        Highlight translated words
      </label>
    </section>

    <section>
      <button id="exclude-site" type="button">Exclude this site</button>
      <p id="site-status" class="status"></p>
    </section>

    <section id="practice-section">
      <h2>Words to practice</h2>
      <div id="practice-list"></div>
    </section>

    <footer>
      <a id="options-link" href="#">Options</a>
    </footer>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
</html>
